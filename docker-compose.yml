services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      MONGODB_URI: mongodb://mongo:27017/airport_parking
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      PORT: 3001
    depends_on:
      mongo:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - backend

  seed:
    build: ./backend
    environment:
      MONGODB_URI: mongodb://mongo:27017/airport_parking
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
    command: node src/seed.js
    depends_on:
      mongo:
        condition: service_healthy
    profiles: ["seed"]

volumes:
  mongo_data:
