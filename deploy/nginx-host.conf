# Host nginx — ku dar /etc/nginx/sites-available/aps
# Beddel server_name iyo root path haddii loo baahdo.
#
# Enable:
#   sudo ln -sf /etc/nginx/sites-available/aps /etc/nginx/sites-enabled/aps
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name YOUR_DOMAIN_OR_IP;

    root /var/www/html/APS/deploy/dist/admin;
    client_max_body_size 10m;

    location /api/ {
        proxy_pass http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /m {
        return 301 /m/;
    }

    location ^~ /m/ {
        alias /var/www/html/APS/deploy/dist/m/;
        index index.html;
        try_files $uri $uri/ /m/index.html;
    }

    location ^~ /_expo/ {
        return 404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
